name: Daily Fantasy Baseball Dashboard

on:
  # SCHEDULE RETIRED: the dashboard now ships as an attachment on the daily digest
  # email (daily-digest.yml runs `send_digest.py --with-dashboard`) -- one fetch, one
  # email. This workflow is kept for MANUAL standalone dashboard sends only.
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  send-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data and email dashboard
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: python dashboard.py --refresh --email
