name: Daily Fantasy Baseball Dashboard

on:
  schedule:
    # Once each morning, firing at 5 AM EDT (09:00 UTC) — just after the daily
    # digest (4 AM EDT) and safely past ESPN's overnight stat/standings refresh,
    # so the --refresh fetch always sees the completed prior day. GitHub's
    # scheduler delays runs 1-4h+, so actual delivery lands mid-morning.
    - cron: '0 9 * * *'
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  send-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data and email dashboard
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: python dashboard.py --refresh --email
