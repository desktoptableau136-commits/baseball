name: Daily Fantasy Baseball Dashboard

on:
  schedule:
    # Once each morning, firing at 2 AM EDT (06:00 UTC) -- same as the digest, so
    # both land together. GitHub's scheduler typically adds ~6h, so it actually
    # EXECUTES (--refresh fetch + email) ~8 AM ET, past ESPN's overnight refresh.
    # Kept in step with the digest cron -- move both together.
    - cron: '0 6 * * *'
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  send-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data and email dashboard
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: python dashboard.py --refresh --email
