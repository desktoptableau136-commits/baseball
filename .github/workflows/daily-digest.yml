name: Daily Fantasy Baseball Digest

on:
  schedule:
    # Once daily, firing at 2 AM EDT (06:00 UTC). GitHub's scheduler typically sits
    # on the job ~6h before running it, so it actually EXECUTES (and emails) ~8 AM ET
    # -- comfortably past ESPN's overnight refresh, so the fetch sees the completed
    # prior day. (Only a rare fast-scheduler day would run it early enough to risk a
    # half-updated day.) Firing earlier -> earlier arrival but more of that risk.
    - cron: '0 6 * * *'
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest (with dashboard attached)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        # One fetch, one email: the digest builds the dashboard and attaches it too,
        # so both deliverables arrive together. (The standalone daily-dashboard.yml
        # schedule is retired -- it now only runs on manual dispatch.)
        run: python send_digest.py --with-dashboard
