name: Daily Fantasy Baseball Digest

on:
  schedule:
    - cron: '0 6 * * *'   # trigger at 2 AM EDT (UTC-4) — GH delays 1-4hr, targets ~4-6 AM EDT delivery
    - cron: '0 15 * * *'  # trigger at 11 AM EDT (UTC-4) — targets ~1-3 PM EDT delivery
  workflow_dispatch:       # allows manual trigger from the GitHub Actions UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: python send_digest.py
